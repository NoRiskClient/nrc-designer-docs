name: Sync wiki/ → GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Mirror wiki/ subfolder to <repo>.wiki.git
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            wiki
          sparse-checkout-cone-mode: false

      - name: Push wiki/ to GitHub Wiki repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          cd wiki

          git init -b master -q
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "sync: ${COMMIT_MSG:-manual run}" -q

          git remote add wiki "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git push wiki master --force
